services:
  rabbitmq:
    image: mcr.microsoft.com/azurelinux/base/rabbitmq-server:3.13
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=username
      - RABBITMQ_DEFAULT_PASS=password

  order-service:
    image: ghcr.io/azure-samples/aks-store-demo/order-service:2.1.0
    container_name: order-service
    ports:
      - "3000:3000"
    environment:
      - ORDER_QUEUE_HOSTNAME=rabbitmq
      - ORDER_QUEUE_PORT=5672
      - ORDER_QUEUE_USERNAME=username
      - ORDER_QUEUE_PASSWORD=password
      - ORDER_QUEUE_NAME=orders
      - FASTIFY_ADDRESS=0.0.0.0
    depends_on:
      rabbitmq:
        condition: service_started

  product-service:
    image: ghcr.io/azure-samples/aks-store-demo/product-service:2.1.0
    container_name: product-service
    ports:
      - "3002:3002"
    environment:
      - AI_SERVICE_URL=http://ai-service:5001/

  store-front:
    image: ghcr.io/azure-samples/aks-store-demo/store-front:2.1.0
    container_name: store-front
    ports:
      - "8080:8080"
    environment:
      - ORDER_SERVICE_URL=http://order-service:3000
      - PRODUCT_SERVICE_URL=http://product-service:3002
    depends_on:
      - order-service
      - product-service