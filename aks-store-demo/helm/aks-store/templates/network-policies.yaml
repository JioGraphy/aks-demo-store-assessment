{{- if .Values.networkPolicies.enabled }}
# Default deny all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# RabbitMQ: ingress from order-service only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 5672
          protocol: TCP
---
# Order-Service: ingress from store-front; egress to rabbitmq
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: store-front
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
          protocol: TCP
---
# Product-Service: ingress from store-front only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: store-front
      ports:
        - port: 3002
          protocol: TCP
---
# Store-Front: ingress from ingress-controller; egress to backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: store-front-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: store-front
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 3000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 3002
          protocol: TCP
{{- end }}